# ============================================================
# SHARED CONFIG — applies to ALL JusticeServe microservices
# Push this file to: https://github.com/Bharat613/justiceserve-config
# ============================================================

# JWT
app.jwt.secret=JusticeServeSecretKey2025SuperSecureBase64EncodedKeyForHMACSHA256Algorithm
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JPA — Hibernate auto-creates/updates tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# MySQL credentials
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Disable Spring Security default random password — we use JWT only
spring.security.user.name=disabled-not-used
spring.security.user.password=disabled-not-used

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.tracing.sampling.probability=0.1

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.justiceserve=INFO

# ================================================================
# Resilience4j Circuit Breaker — for all Feign clients
# ================================================================
# Feign — enable circuit breaker
spring.cloud.openfeign.circuitbreaker.enabled=true

# Default circuit breaker settings (applies to all Feign clients)
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=5
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=3
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.eventConsumerBufferSize=10

# Specific circuit breakers per Feign client
resilience4j.circuitbreaker.instances.compliance-service.baseConfig=default
resilience4j.circuitbreaker.instances.notification-service.baseConfig=default
resilience4j.circuitbreaker.instances.case-service.baseConfig=default
resilience4j.circuitbreaker.instances.identity-service.baseConfig=default
resilience4j.circuitbreaker.instances.citizen-service.baseConfig=default

# Feign timeout settings
feign.client.config.default.connectTimeout=3000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=BASIC
